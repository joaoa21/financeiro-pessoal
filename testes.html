<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinanceOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0b0f16;
        --card: #111827;
        --card2: #161f2e;
        --border: #1e2d3d;
        --border2: #243447;
        --navy: #334960;
        --orange: #f46524;
        --orange2: #ff7533;
        --green: #10b981;
        --green-dim: rgba(16, 185, 129, 0.1);
        --red: #ef4444;
        --red-dim: rgba(239, 68, 68, 0.1);
        --yellow: #f59e0b;
        --yellow-dim: rgba(245, 158, 11, 0.1);
        --blue: #3b82f6;
        --blue-dim: rgba(59, 130, 246, 0.1);
        --purple: #8b5cf6;
        --purple-dim: rgba(139, 92, 246, 0.1);
        --text: #e2e8f0;
        --text2: #94a3b8;
        --text3: #556070;
        --r: 12px;
        --rs: 8px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        font-size: 14px;
      }

      /* HEADER */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        height: 60px;
        background: var(--card);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 50;
        gap: 12px;
      }
      .logo {
        font-family: "Outfit", sans-serif;
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .logo-mark {
        width: 28px;
        height: 28px;
        background: var(--orange);
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        color: white;
        font-weight: 800;
      }
      .logo span {
        color: var(--orange);
      }
      .month-nav {
        display: flex;
        align-items: center;
        background: var(--card2);
        border: 1px solid var(--border);
        border-radius: var(--r);
        overflow: hidden;
        flex-shrink: 0;
      }
      .mnav-btn {
        width: 36px;
        height: 36px;
        border: none;
        background: transparent;
        color: var(--text2);
        cursor: pointer;
        font-size: 18px;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .mnav-btn:hover {
        background: var(--border);
        color: var(--text);
      }
      .mnav-label {
        font-family: "Outfit", sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        min-width: 130px;
        text-align: center;
        text-transform: capitalize;
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .header-right {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
      }
      .btn-sm {
        padding: 6px 11px;
        border-radius: var(--rs);
        border: 1px solid var(--border2);
        background: transparent;
        color: var(--text2);
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        font-size: 11px;
        font-weight: 500;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        gap: 4px;
        white-space: nowrap;
      }
      .btn-sm:hover {
        background: var(--card2);
        color: var(--text);
        border-color: var(--navy);
      }
      .btn-sm.danger:hover {
        background: var(--red-dim);
        color: var(--red);
        border-color: var(--red);
      }

      .main {
        max-width: 1280px;
        margin: 0 auto;
        padding: 24px;
      }

      /* SUMMARY */
      .summary {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 16px;
        margin-bottom: 16px;
      }
      .scard {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: 16px 18px;
        cursor: default;
        transition: border-color 0.2s;
        position: relative;
        overflow: hidden;
      }
      .scard::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        border-radius: 2px 2px 0 0;
      }
      .scard.c-blue::after {
        background: var(--blue);
      }
      .scard.c-green::after {
        background: var(--green);
      }
      .scard.c-red::after {
        background: var(--red);
      }
      .scard.c-orange::after {
        background: var(--orange);
      }
      .scard:hover {
        border-color: var(--border2);
      }
      .scard.c-destaque {
        background: linear-gradient(135deg, #1a2e20 0%, #0f1e28 100%);
        border-color: var(--green);
        box-shadow:
          0 0 0 1px rgba(16, 185, 129, 0.15),
          0 4px 20px rgba(16, 185, 129, 0.08);
      }
      .scard.c-destaque::after {
        background: var(--green);
      }
      .scard.c-destaque .scard-label {
        color: var(--green);
        opacity: 0.7;
      }
      .scard.c-destaque .scard-value { font-size:24px; }
      .scard.c-destaque.saldo-neg { background:linear-gradient(135deg,#2a1414 0%,#1a0f0f 100%);border-color:var(--red);box-shadow:0 0 0 1px rgba(239,68,68,.15),0 4px 20px rgba(239,68,68,.08); }
      .scard.c-destaque.saldo-neg .scard-label { color:var(--red);opacity:.7; }
      .scard-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text3);
        margin-bottom: 6px;
      }
      .scard-value {
        font-family: "Outfit", sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.1;
      }
      .scard-value.pos {
        color: var(--green);
      }
      .scard-value.neg {
        color: var(--red);
      }
      .scard-sub {
        font-size: 11px;
        color: var(--text3);
        margin-top: 4px;
      }

      /* PROGRESS */
      .progress-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        padding-bottom: 16px;
      }
      .pcard {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: 14px 18px;
      }
      .pcard-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .pcard-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text3);
      }
      .pcard-amounts {
        display: flex;
        gap: 12px;
        font-size: 12px;
      }
      .pamt-plan {
        color: var(--text3);
      }
      .pamt-real {
        color: var(--text);
        font-weight: 600;
      }
      .pbar {
        height: 5px;
        background: var(--border);
        border-radius: 100px;
        overflow: hidden;
      }
      .pbar-fill {
        height: 100%;
        border-radius: 100px;
        transition: width 0.5s ease;
      }
      .fill-green{background:var(--green)}.fill-red{background:var(--red)}.fill-yellow{background:var(--yellow)}

      /* LAYOUT */
      .layout-main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto 1fr;
        gap: 16px;
        align-items: start;
      }
      .col-left {
        grid-column: 1;
        grid-row: 1/3;
      }
      .col-right-top {
        grid-column: 2;
        grid-row: 1;
      }
      .col-right-bottom {
        grid-column: 2;
        grid-row: 2;
      }
      .section {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--r);
        overflow: hidden;
      }

      /* SECTION HEADER */
      .sec-head {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 16px 18px;
        border-bottom: 1px solid var(--border);
      }
      .sec-head-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }
      .sec-title-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }
      .sec-icon {
        width: 30px;
        height: 30px;
        border-radius: var(--rs);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
      }
      .icon-r {
        background: var(--red-dim);
      }
      .icon-g {
        background: var(--green-dim);
      }
      .icon-y {
        background: var(--yellow-dim);
      }
      .sec-title {
        font-family: "Outfit", sans-serif;
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
      }
      .sec-sub {
        font-size: 11px;
        color: var(--text3);
        margin-top: 2px;
      }
      .sec-sub2 {
        font-size: 10px;
        color: var(--text3);
        margin-top: 4px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .sub2-tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .sub2-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      /* FILTER TABS */
      .ftabs {
        display: flex;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--rs);
        padding: 3px;
        gap: 2px;
        width: fit-content;
      }
      .ftab {
        padding: 4px 10px;
        border-radius: 5px;
        border: none;
        background: transparent;
        color: var(--text3);
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        font-size: 11px;
        font-weight: 500;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .ftab.active {
        background: var(--card2);
        color: var(--text);
      }
      .ftab:hover:not(.active) {
        color: var(--text2);
      }

      /* BUTTONS */
      .btn-add {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 6px 12px;
        background: var(--orange);
        color: white;
        border: none;
        border-radius: var(--rs);
        font-family: "DM Sans", sans-serif;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .btn-add:hover {
        background: var(--orange2);
        transform: translateY(-1px);
      }
      .btn-ghost {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px 9px;
        background: transparent;
        color: var(--green);
        border: 1px solid rgba(16, 185, 129, 0.3);
        border-radius: var(--rs);
        font-family: "DM Sans", sans-serif;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .btn-ghost:hover {
        background: var(--green-dim);
      }

      /* TABLE */
      .table-wrap {
        overflow-x: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }
      thead th {
        padding: 9px 10px;
        text-align: left;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text3);
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      thead th:first-child {
        padding-left: 14px;
      }
      thead th.right {
        text-align: right;
        padding-right: 12px;
      }
      /* breathing room between status badge and action buttons */
      .desp-table td:nth-child(4),
      .rend-table td:nth-child(4) {
        padding-right: 20px;
      }
      .desp-table td:nth-child(5),
      .rend-table td:nth-child(5) {
        padding-left: 0;
      }
      thead th.sortable {
        cursor: pointer;
        user-select: none;
      }
      thead th.sortable:hover {
        color: var(--text2);
      }
      .desp-table th:nth-child(1) {
        width: 46%;
      }
      .desp-table th:nth-child(2) {
        width: 26%;
      }
      .desp-table th:nth-child(3) {
        width: 12%;
      }
      .desp-table th:nth-child(4) {
        width: 16%;
      }
      .rend-table th:nth-child(1) {
        width: 44%;
      }
      .rend-table th:nth-child(2) {
        width: 28%;
      }
      .rend-table th:nth-child(3) {
        width: 12%;
      }
      .rend-table th:nth-child(4) {
        width: 16%;
      }
      tbody tr {
        border-bottom: 1px solid var(--border);
        transition: background 0.1s;
        cursor: grab;
      }
      tbody tr:last-child {
        border-bottom: none;
      }
      tbody tr:hover {
        background: rgba(255, 255, 255, 0.02);
      }
      tbody tr:active {
        cursor: grabbing;
      }
      tbody tr.dragging {
        opacity: 0.3;
      }
      tbody tr.drag-target {
        background: rgba(244, 101, 36, 0.07) !important;
        outline: 1px dashed rgba(244, 101, 36, 0.35);
      }
      tbody td {
        padding: 11px 10px;
        color: var(--text);
        font-size: 13px;
        vertical-align: middle;
        white-space: nowrap;
      }
      tbody td:first-child {
        padding-left: 14px;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      tbody td.right { text-align:right; padding-right:12px; padding-left:6px; }
      .td-muted {
        color: var(--text3);
      }

      /* Color stripe — tipo (overridden by done) */
      tr.tr-boleto:not(.tr-done) td:first-child {
        box-shadow: inset 3px 0 0 var(--blue);
      }
      tr.tr-cartao:not(.tr-done) td:first-child {
        box-shadow: inset 3px 0 0 var(--purple);
      }
      tr.tr-espora:not(.tr-done) td:first-child {
        box-shadow: inset 3px 0 0 var(--yellow);
      }
      /* Paid/received row */
      tbody tr.tr-done {
        background: rgba(16, 185, 129, 0.05);
      }
      tbody tr.tr-done:hover {
        background: rgba(16, 185, 129, 0.09);
      }
      tbody tr.tr-done td:first-child {
        box-shadow: inset 3px 0 0 var(--green);
      }

      /* BADGES */
      .badge-inline {
        display: inline-flex;
        align-items: center;
        font-size: 9px;
        font-weight: 700;
        padding: 1px 6px;
        border-radius: 100px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        vertical-align: middle;
        margin-left: 6px;
        background: var(--green-dim);
        color: var(--green);
      }
      .badge-hoje {
        background: rgba(244, 101, 36, 0.15);
        color: var(--orange);
      }

      /* ROW ACTIONS - always visible, equal size */
      .row-acts {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 5px;
      }
      .ibt {
        width: 26px;
        height: 26px;
        border-radius: 5px;
        border: none;
        background: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        color: var(--text3);
        transition: all 0.1s;
        flex-shrink: 0;
      }
      .ibt:hover {
        background: var(--border2);
        color: var(--text);
      }
      .ibt.chk:hover {
        background: var(--green-dim);
        color: var(--green);
      }
      .ibt.del:hover {
        background: var(--red-dim);
        color: var(--red);
      }
      .ibt.chk.is-done {
        color: var(--green);
      }

      .empty {
        text-align: center;
        padding: 36px 24px;
        color: var(--text3);
      }
      .empty-icon {
        font-size: 22px;
        margin-bottom: 8px;
      }

      /* INVESTMENTS */
      .inv-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
        padding: 16px;
      }
      .inv-card {
        background: var(--card2);
        border: 1px solid var(--border);
        border-radius: var(--rs);
        padding: 14px;
        position: relative;
        transition: border-color 0.15s;
      }
      .inv-card:hover {
        border-color: var(--border2);
      }
      .inv-card.cdb-card {
        border-color: rgba(16, 185, 129, 0.25);
      }
      .inv-card-acts {
        position: absolute;
        top: 8px;
        right: 8px;
        display: flex;
        gap: 4px;
      }
      .inv-name {
        font-weight: 600;
        font-size: 13px;
        margin-bottom: 2px;
        padding-right: 56px;
      }
      .inv-type {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text3);
        margin-bottom: 10px;
      }
      .inv-val {
        font-family: "Outfit", sans-serif;
        font-size: 19px;
        font-weight: 700;
        color: var(--green);
      }
      .inv-rend {
        font-size: 11px;
        color: var(--green);
        margin-top: 2px;
      }
      .inv-rend.neg {
        color: var(--red);
      }
      .inv-meta {
        display: flex;
        justify-content: space-between;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--border);
        font-size: 10px;
        color: var(--text3);
      }
      .inv-aportes {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--border);
      }
      .inv-aporte-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 11px;
        color: var(--text3);
        padding: 3px 0;
        gap: 6px;
      }
      .inv-aporte-val {
        color: var(--text);
        font-weight: 500;
        flex-shrink: 0;
      }
      .inv-aporte-tag {
        font-size: 9px;
        padding: 1px 5px;
        border-radius: 100px;
        background: var(--yellow-dim);
        color: var(--yellow);
        flex-shrink: 0;
      }
      .inv-aporte-del {
        width: 16px;
        height: 16px;
        border-radius: 3px;
        border: none;
        background: transparent;
        cursor: pointer;
        color: var(--text3);
        font-size: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .inv-aporte-del:hover {
        background: var(--red-dim);
        color: var(--red);
      }
      .inv-total {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-top: 1px solid var(--border);
      }
      .inv-total-label {
        font-size: 12px;
        color: var(--text3);
      }
      .inv-total-val {
        font-family: "Outfit", sans-serif;
        font-size: 15px;
        font-weight: 700;
        color: var(--green);
      }

      /* CDI BADGE */
      .cdi-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        color: var(--text3);
        background: var(--card2);
        border: 1px solid var(--border);
        border-radius: 100px;
        padding: 3px 9px;
        flex-shrink: 0;
      }
      .cdi-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--text3);
      }
      .cdi-dot.live {
        background: var(--green);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /* MODAL */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        backdrop-filter: blur(3px);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .overlay.open {
        opacity: 1;
        pointer-events: all;
      }
      .modal {
        background: var(--card);
        border: 1px solid var(--border2);
        border-radius: var(--r);
        padding: 26px;
        width: 440px;
        max-width: 96vw;
        transform: translateY(10px) scale(0.98);
        transition: transform 0.2s;
        max-height: 90vh;
        overflow-y: auto;
      }
      .overlay.open .modal {
        transform: translateY(0) scale(1);
      }
      .modal-title {
        font-family: "Outfit", sans-serif;
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 20px;
        color: var(--text);
      }
      .fg {
        margin-bottom: 13px;
      }
      .fg label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text3);
        margin-bottom: 5px;
      }
      .fi,
      .fs {
        width: 100%;
        padding: 9px 12px;
        background: var(--bg);

        font-size: 13px;

        padding: 9px 18px;

      /* CHECK ROW */
      .check-row {

      /* RADIO OPTIONS */
      .radio-group {

      .radio-opt {
        display: flex;
        align-items: flex-start;

      /* SALDO EDIT */

      /* TOAST */
      .toast {

  </head>

    <script>
      const MONTHS = [
        "Janeiro",
        "Fevereiro",
        "Março",
        "Abril",
        "Maio",
        "Junho",
        "Julho",
        "Agosto",
        "Setembro",
        "Outubro",
        "Novembro",
        "Dezembro",
      ];
      const INV_TIPOS = [
        "CDB",
        "Ações",
        "FII",
        "Renda Fixa",
        "Tesouro Direto",
        "Criptomoedas",
        "Outro",
      ];

      let yr = new Date().getFullYear(),
        mo = new Date().getMonth();
      let state = {},
        curFilter = "todos",
        modalCtx = null,
        cdiDiary = null,
        dragId = null,
        dragSec = null;
      let despSort = null,
        rendSort = null; // null | 'asc' | 'desc'
      let undoStack = []; // {desc, restore: fn}

      // ─── KEY / MONTH ────────────────────────────────────────
      function uid() { return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
      function getKey(y, m) {
        y = y ?? yr;
        m = m ?? mo;
        return `${y}-${String(m + 1).padStart(2, "0")}`;
      }
      function getMonth(y, m) {
        const k = getKey(y, m);
        if (!state[k])
          state[k] = {
            saldoInicial: 0,
            despesas: [],
            rendas: [],
            investimentos: [],
          };
        return state[k];
      }
      function save() {
        localStorage.setItem("fos_v3", JSON.stringify(state));
      }

      // ─── MIGRATE ────────────────────────────────────────────
      function migrate() {
        Object.values(state).forEach((m) => {
          if (!m.despesas) m.despesas = [];
          if (!m.rendas) m.rendas = [];
          if (!m.investimentos) m.investimentos = [];
          m.despesas.forEach((d) => {
            if (d.tipo === "cartao") {
              d.tipo = "fixo";
              d.subtipo = "cartao";
            }
            if (d.tipo === "fixo" && !d.subtipo) d.subtipo = "boleto";
            if (d.data && typeof d.data === "string" && d.data.includes("-"))
              d.data = parseInt(d.data.split("-")[2], 10);
          });
          m.rendas.forEach((r)=>{
            if(r.data&&typeof r.data==="string"&&r.data.includes("-"))r.data=parseInt(r.data.split("-")[2],10);
            if(r.dividendoDe===undefined)r.dividendoDe=null;
          });
          m.despesas.forEach((d)=>{ if(d.autoReplicar===undefined)d.autoReplicar=false; });
          m.investimentos.forEach((i) => {
            // old CDB with valorInicial → aportes
            if (i.valorInicial !== undefined && !i.aportes) {
              i.aportes = [
                {
                  id: uid(),
                  valor: i.valorInicial,
                  data: i.dataInicio || new Date().toISOString().slice(0, 10),
                  impacto: "nenhum",
                },
              ];
              delete i.valorInicial;
              delete i.dataInicio;
            }
            // ensure aportes array
            if (!i.aportes) i.aportes = [];
          });
        });
      }

      function load() {
        const s =
          localStorage.getItem("fos_v3") || localStorage.getItem("fos_v2");
        if (s) {
          state = JSON.parse(s);
          migrate();
          return;
        }
      }

      // ─── CDI ────────────────────────────────────────────────
      async function fetchCDI() {
        try {
          const r = await fetch("https://api.bcb.gov.br/dados/serie/bcdata.sgs.12/dados/ultimos/1?formato=json");
          if (!r.ok) throw 0;
          const data = await r.json();
          cdiDiary = parseFloat(data[0].valor) / 100;
          localStorage.setItem("fos_cdi", JSON.stringify({ val: cdiDiary, ts: Date.now() }));
          const aa = (Math.pow(1 + cdiDiary, 252) - 1) * 100;
          document.getElementById("cdiDot").classList.add("live");
          document.getElementById("cdiLabel").textContent = `CDI ${aa.toFixed(2)}% a.a.`;
        } catch {
          const cached = JSON.parse(localStorage.getItem("fos_cdi") || "null");
          if (cached && Date.now() - cached.ts < 7 * 86400000) {
            cdiDiary = cached.val;
            document.getElementById("cdiLabel").textContent = `CDI ~${((Math.pow(1+cdiDiary,252)-1)*100).toFixed(2)}% a.a.`;
          } else {
            cdiDiary = Math.pow(1 + 13.75 / 100, 1 / 252) - 1;
            document.getElementById("cdiLabel").textContent = "CDI ~13.75%";
          }
        }
        render();
      }

      function businessDays(s, e) {
        const sd = new Date(s + "T12:00:00"),
          ed = new Date(e + "T12:00:00");
        let n = 0,
          d = new Date(sd);
        while (d <= ed) {
          if (d.getDay() !== 0 && d.getDay() !== 6) n++;
          d.setDate(d.getDate() + 1);
        }
        return n;
      }

      // CDB: each aporte earns from its own date
      function calcCDB(inv) {
        if (!inv.aportes || !inv.aportes.length) return null;
        const rate = cdiDiary ?? Math.pow(1 + 13.75 / 100, 1 / 252) - 1;
        const myRate = rate * ((inv.percentualCDI || 100) / 100);
        const today = new Date().toISOString().slice(0, 10);
        let valorAtual = 0,
          valorTotal = 0;
        inv.aportes.forEach((a) => {
          const days = businessDays(a.data, today);
          valorAtual +=
            days > 0 ? a.valor * Math.pow(1 + myRate, days) : a.valor;
          valorTotal += a.valor;
        });
        return {
          valorAtual,
          rendimento: valorAtual - valorTotal,
          rendPct:
            valorTotal > 0 ? ((valorAtual - valorTotal) / valorTotal) * 100 : 0,
          valorTotal,
        };
      }

      // investment impact totals
      function calcInvImpact(data) {
        let planejado = 0,
          realizado = 0;
        data.investimentos.forEach((i) => {
          (i.aportes || []).forEach((a) => {
            if (a.impacto === "planejado" || a.impacto === "realizado")
              planejado += a.valor;
            if (a.impacto === "realizado") realizado += a.valor;
          });
          if (!i.aportes || i.aportes.length === 0) {
            if (i.impacto === "planejado" || i.impacto === "realizado")
              planejado += i.valor || 0;
            if (i.impacto === "realizado") realizado += i.valor || 0;
          }
        });
        return { planejado, realizado };
      }

      // ─── FORMAT ─────────────────────────────────────────────
      function brl(v) {
        return new Intl.NumberFormat("pt-BR", {
          style: "currency",
          currency: "BRL",
        }).format(v || 0);
      }
      function fmtDay(d) {
        if (!d && d !== 0) return "—";
        if (typeof d === "number") return String(d);
        if (typeof d === "string" && d.includes("-"))
          return String(parseInt(d.split("-")[2], 10));
        return String(d);
      }
      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
      function dayVal(d) {
        if (!d && d !== 0) return 99;
        return typeof d === "number"
          ? d
          : parseInt(String(d).split("-")[2] || 99, 10);
      }

      // ─── NAVIGATE ───────────────────────────────────────────
      function prevMonth() { mo--; if(mo<0){mo=11;yr--;} despSort=rendSort=null; autoReplicate(); render(); }
      function nextMonth() { mo++; if(mo>11){mo=0;yr++;} despSort=rendSort=null; autoReplicate(); render(); }
      function autoReplicate() {
        const curr=getMonth(),pmo=mo===0?11:mo-1,pyr=mo===0?yr-1:yr,prev=getMonth(pyr,pmo);
        const toRep=prev.despesas.filter(d=>d.tipo==="fixo"&&d.autoReplicar);
        if(!toRep.length)return;
        const existing=new Set(curr.despesas.map(d=>d.nome.toLowerCase()));
        let added=0;
        toRep.forEach(d=>{if(!existing.has(d.nome.toLowerCase())){curr.despesas.push({...d,id:uid(),realizado:0});added++;}});
        if(added){save();setTimeout(()=>toast(added+" despesa(s) replicada(s) automaticamente","ok"),100);}
      }

      // ─── SORT ───────────────────────────────────────────────
      function toggleSort(sec) {
        if (sec === "d") {
          despSort =
            despSort === null ? "asc" : despSort === "asc" ? "desc" : null;
          document.getElementById("despDiaHead").textContent =
            "Dia " +
            (despSort === "asc" ? "↑" : despSort === "desc" ? "↓" : "↕");
        } else {
          rendSort =
            rendSort === null ? "asc" : rendSort === "asc" ? "desc" : null;
          document.getElementById("rendDiaHead").textContent =
            "Dia " +
            (rendSort === "asc" ? "↑" : rendSort === "desc" ? "↓" : "↕");
        }
        render();
      }

      // ─── RENDER ─────────────────────────────────────────────
      function render() {
        const data = getMonth();
        const today = new Date();
        const todayDay = today.getDate();
        const isCurrentMonth =
          yr === today.getFullYear() && mo === today.getMonth();

        // ── Today banner ──
        const banner = document.getElementById("todayBanner");
        if (isCurrentMonth) {
          const todayDesp = data.despesas.filter(
            (d) => d.data === todayDay && d.tipo === "fixo",
          );
          const todayRend = data.rendas.filter((r) => r.data === todayDay);
          if (todayDesp.length || todayRend.length) {
            const allItems = [
              ...todayDesp.map(
                (d) =>
                  `<span class="today-item ${d.realizado > 0 ? "done" : ""}">${esc(d.nome)} <span class="today-item-val">${brl(d.planejado)}</span></span>`,
              ),
              ...todayRend.map(
                (r) =>
                  `<span class="today-item ${r.realizado > 0 ? "done" : ""}" style="${r.realizado > 0 ? "" : "border-color:rgba(16,185,129,0.25);background:rgba(16,185,129,0.06)"}">${esc(r.nome)} <span class="today-item-val" style="color:var(--green)">${brl(r.planejado)}</span></span>`,
              ),
            ].join("");
            const pendentes =
              todayDesp.filter((d) => d.realizado === 0).length +
              todayRend.filter((r) => r.realizado === 0).length;
            banner.style.display = "";
            banner.innerHTML = `<div class="today-banner">
        <div class="today-banner-icon">📅</div>
        <div>
          <div class="today-banner-title">Hoje, dia ${todayDay} — ${pendentes > 0 ? `${pendentes} pendente(s)` : "Tudo em dia ✓"}</div>
          <div class="today-banner-items">${allItems}</div>
        </div>
      </div>`;
          } else {
            banner.style.display = "none";
          }
        } else {
          banner.style.display = "none";
        }
        document.getElementById("monthLabel").textContent =
          MONTHS[mo] + " " + yr;

        const tDP = data.despesas.reduce((s, d) => s + d.planejado, 0);
        const tDR = data.despesas.reduce((s, d) => s + d.realizado, 0);
        const tRP = data.rendas.reduce((s, r) => s + r.planejado, 0);
        const tRR = data.rendas.reduce((s, r) => s + r.realizado, 0);
        const inv = calcInvImpact(data);

        // Sobra = saldoInicial + renda - despesas - investimentos planejados
        const sobra = data.saldoInicial + tRP - tDP - inv.planejado;
        const base = data.saldoInicial + tRP;
        const econ = base > 0 ? (sobra / base) * 100 : 0;
        // Na conta = saldoInicial + recebido - pago - investimentos realizados
        const naConta = data.saldoInicial + tRR - tDR - inv.realizado;

        let tInvCarteira = 0;
        data.investimentos.forEach((i) => {
          if (i.tipo === "CDB" && i.aportes && i.aportes.length) {
            const c = calcCDB(i);
            tInvCarteira += c ? c.valorAtual : 0;
          } else
            tInvCarteira +=
              (i.valor || 0) +
              (i.aportes || []).reduce((s, a) => s + a.valor, 0);
        });

        // ── Summary cards ──
        document.getElementById("summary").innerHTML = `
    <div class="scard c-blue">
      <div class="scard-label">Saldo Inicial</div>
      <div class="scard-value">${brl(data.saldoInicial)}</div>
      <div class="scard-sub"><a href="#" onclick="editSaldo(event)" style="color:var(--text3);text-decoration:none;font-size:10px">✏ editar</a></div>
    </div>
    <div class="scard c-green">
      <div class="scard-label">Renda Planejada</div>
      <div class="scard-value pos">${brl(tRP)}</div>
      <div class="scard-sub">${brl(tRR)} recebidos</div>
    </div>
    <div class="scard c-red">
      <div class="scard-label">Despesas Planejadas</div>
      <div class="scard-value">${brl(tDP)}</div>
      <div class="scard-sub">${brl(tDR)} pagos</div>
    </div>
    <div class="scard c-orange">
      <div class="scard-label">Sobra Planejada</div>
      <div class="scard-value ${sobra >= 0 ? "pos" : "neg"}">${brl(sobra)}</div>
      <div class="scard-sub">${econ.toFixed(1)}% de economia</div>
    </div>
    <div class="scard c-destaque ${naConta < 0 ? 'saldo-neg' : ''}">
      <div class="scard-label">Na Conta (Atual)</div>
      <div class="scard-value ${naConta >= 0 ? "pos" : "neg"}">${brl(naConta)}</div>
      <div class="scard-sub">saldo + recebido − pago</div>
    </div>`;

        // ── Progress ──
        const dRaw=tDP>0?(tDR/tDP)*100:0,dPct=Math.min(dRaw,100),dOver=dRaw>100;
        const rPct=tRP>0?Math.min((tRR/tRP)*100,100):0;
        document.getElementById("progressRow").innerHTML = `
    <div class="pcard">
      <div class="pcard-head"><span class="pcard-title">Despesas${dOver?' <span style="color:var(--yellow);font-size:10px">⚠ acima do planejado</span>':''}</span>
        <div class="pcard-amounts"><span class="pamt-plan">Planejado ${brl(tDP)}</span><span class="pamt-real" style="${dOver?'color:var(--yellow)':''}">Pago ${brl(tDR)}</span></div>
      </div>
      <div class="pbar"><div class="pbar-fill ${dOver?'fill-yellow':'fill-red'}" style="width:${dPct}%"></div></div>
    </div>
    <div class="pcard">
      <div class="pcard-head"><span class="pcard-title">Renda</span>
        <div class="pcard-amounts"><span class="pamt-plan">Planejado ${brl(tRP)}</span><span class="pamt-real">Recebido ${brl(tRR)}</span></div>
      </div>
      <div class="pbar"><div class="pbar-fill fill-green" style="width:${rPct}%"></div></div>
    </div>`;

        // ── Despesas breakdown ──
        const tBoleto = data.despesas
          .filter((d) => d.tipo === "fixo" && d.subtipo === "boleto")
          .reduce((s, d) => s + d.planejado, 0);
        const tCartao = data.despesas
          .filter((d) => d.tipo === "fixo" && d.subtipo === "cartao")
          .reduce((s, d) => s + d.planejado, 0);
        const tEspora = data.despesas
          .filter((d) => d.tipo === "esporadico")
          .reduce((s, d) => s + d.planejado, 0);
        document.getElementById("despBreak").innerHTML = `
    <span class="sub2-tag"><span class="sub2-dot" style="background:#8b9ab0"></span>Fixas ${brl(tBoleto + tCartao)}</span>
    <span class="sub2-tag"><span class="sub2-dot" style="background:#60a5fa"></span>Boleto ${brl(tBoleto)}</span>
    <span class="sub2-tag"><span class="sub2-dot" style="background:#a78bfa"></span>Cartão ${brl(tCartao)}</span>
    <span class="sub2-tag"><span class="sub2-dot" style="background:#fbbf24"></span>Esporádico ${brl(tEspora)}</span>`;

        // ── Despesas table ──
        let dlist = data.despesas.filter(
          (d) => curFilter === "todos" || d.tipo === curFilter,
        );
        if (despSort === "asc")
          dlist = [...dlist].sort((a, b) => dayVal(a.data) - dayVal(b.data));
        else if (despSort === "desc")
          dlist = [...dlist].sort((a, b) => dayVal(b.data) - dayVal(a.data));
        const fP = dlist.reduce((s, d) => s + d.planejado, 0);
        const fR = dlist.reduce((s, d) => s + d.realizado, 0);
        document.getElementById("despSub").textContent =
          `${brl(fP)} planejado · ${brl(fR)} pago`;

        if (dlist.length === 0) {
          document.getElementById("despBody").innerHTML = "";
          document.getElementById("despEmpty").style.display = "";
        } else {
          document.getElementById("despEmpty").style.display = "none";
          document.getElementById("despBody").innerHTML = dlist
            .map((d) => {
              const done = d.realizado > 0;
              const hoje = d.data === todayDay && isCurrentMonth;
              const tc =
                (d.tipo === "esporadico"
                  ? "tr-espora"
                  : d.subtipo === "cartao"
                    ? "tr-cartao"
                    : "tr-boleto") + (done ? " tr-done" : "");
              return `<tr class="${tc}" draggable="true"
        ondragstart="dStart(event,'${d.id}','d')" ondragover="dOver(event)"
        ondrop="dDrop(event,'${d.id}','d')" ondragleave="dLeave(event)" ondragend="dEnd()">
        <td title="${esc(d.nome)}">${esc(d.nome)}${done?'<span class="badge-inline">Pago</span>':hoje&&d.tipo==="fixo"?'<span class="badge-inline badge-hoje">Hoje</span>':""}${d.autoReplicar?'<span class="auto-rep-badge">🔄</span>':"" }</td>
        <td>${brl(d.planejado)}</td>
        <td class="td-muted">${fmtDay(d.data)}</td>
        <td class="right"><div class="row-acts">
          <button class="ibt chk ${done ? "is-done" : ""}" onclick="toggle('d','${d.id}')" title="${done ? "Desmarcar" : "Marcar pago"}">✓</button>
          <button class="ibt" onclick="openModal('despesa','${d.id}')" title="Editar">⚙</button>
          <button class="ibt del" onclick="del('d','${d.id}')" title="Excluir">✕</button>
        </div></td>
      </tr>`;
            })
            .join("");
        }

        // ── Renda table ──
        let rlist = [...data.rendas];
        if (rendSort === "asc")
          rlist.sort((a, b) => dayVal(a.data) - dayVal(b.data));
        else if (rendSort === "desc")
          rlist.sort((a, b) => dayVal(b.data) - dayVal(a.data));
        document.getElementById("rendSub").textContent =
          `${brl(tRP)} planejado · ${brl(tRR)} recebido`;
        if (rlist.length === 0) {
          document.getElementById("rendBody").innerHTML = "";
          document.getElementById("rendEmpty").style.display = "";
        } else {
          document.getElementById("rendEmpty").style.display = "none";
          document.getElementById("rendBody").innerHTML = rlist
            .map((r) => {
              const done = r.realizado > 0;
              return `<tr class="${done ? "tr-done" : ""}" draggable="true"
        ondragstart="dStart(event,'${r.id}','r')" ondragover="dOver(event)"
        ondrop="dDrop(event,'${r.id}','r')" ondragleave="dLeave(event)" ondragend="dEnd()">
        <td title="${esc(r.nome)}">${esc(r.nome)}${done?'<span class="badge-inline">Recebido</span>':""}${r.dividendoDe?'<span class="badge-inline" style="background:rgba(245,158,11,.15);color:var(--yellow)">💰</span>':"" }</td>
        <td>${brl(r.planejado)}</td>
        <td class="td-muted">${fmtDay(r.data)}</td>
        <td class="right"><div class="row-acts">
          <button class="ibt chk ${done ? "is-done" : ""}" onclick="toggle('r','${r.id}')" title="${done ? "Desmarcar" : "Marcar recebido"}">✓</button>
          <button class="ibt" onclick="openModal('renda','${r.id}')" title="Editar">⚙</button>
          <button class="ibt del" onclick="del('r','${r.id}')" title="Excluir">✕</button>
        </div></td>
      </tr>`;
            })
            .join("");
        }

        // ── Investimentos ──
        document.getElementById("invSub").textContent =
          `${brl(tInvCarteira)} em carteira`;
        if (data.investimentos.length === 0) {
          document.getElementById("invGrid").innerHTML = "";
          document.getElementById("invEmpty").style.display = "";
          document.getElementById("invTotal").style.display = "none";
        } else {
          document.getElementById("invEmpty").style.display = "none";
          document.getElementById("invTotal").style.display = "flex";
          document.getElementById("invTotalVal").textContent =
            brl(tInvCarteira);
          document.getElementById("invGrid").innerHTML = data.investimentos
            .map((i) => {
              if (i.tipo === "CDB" && i.aportes && i.aportes.length) {
                const c = calcCDB(i);
                const va = c ? c.valorAtual : 0,
                  rd = c ? c.rendimento : 0,
                  rp = c ? c.rendPct : 0,
                  vt = c ? c.valorTotal : 0;
                const sg = rd >= 0 ? "+" : "";
                const aporteRows = i.aportes
                  .map(
                    (a) => `
          <div class="inv-aporte-row">
            <span>${a.data ? new Date(a.data + "T12:00:00").toLocaleDateString("pt-BR", { day: "2-digit", month: "short", year: "2-digit" }) : ""}</span>
            <span class="inv-aporte-val">${brl(a.valor)}</span>
            ${a.impacto === "antecipado" ? '<span class="inv-aporte-tag">Antecipado</span>' : ""}
            <button class="inv-aporte-del" onclick="delAporte('${i.id}','${a.id}')" title="Remover aporte">✕</button>
          </div>`,
                  )
                  .join("");
                return `<div class="inv-card cdb-card">
          <div class="inv-card-acts">
            <button class="btn-ghost" onclick="openAporte('${i.id}')">+ Aporte</button>
            <button class="ibt" onclick="openModal('investimento','${i.id}')" title="Editar">⚙</button>
            <button class="ibt del" onclick="del('i','${i.id}')">✕</button>
          </div>
          <div class="inv-name">${esc(i.nome)}</div>
          <div class="inv-type">CDB · ${i.percentualCDI || 100}% CDI</div>
          <div class="inv-val">${brl(va)}</div>
          <div class="inv-rend ${rd < 0 ? "neg" : ""}">${sg}${brl(rd)} (${sg}${rp.toFixed(3)}%)</div>
          <div class="inv-meta"><span>Aportado: ${brl(vt)}</span><span>${i.aportes.length} aporte(s)</span></div>
          ${i.aportes.length ? `<div class="inv-aportes">${aporteRows}</div>` : ""}
          <div style="margin-top:8px"><button class="btn-ghost" style="width:100%;justify-content:center" onclick="carryInvest('${i.id}')">→ Próximo mês</button></div>
        </div>`;
              }
              // outros investimentos — também suportam aportes
              const totalVal =
                (i.valor || 0) +
                (i.aportes || []).reduce((s, a) => s + a.valor, 0);
              const aporteRows = (i.aportes || [])
                .map(
                  (a) => `
        <div class="inv-aporte-row">
          <span>${a.data ? new Date(a.data + "T12:00:00").toLocaleDateString("pt-BR", { day: "2-digit", month: "short", year: "2-digit" }) : ""}</span>
          <span class="inv-aporte-val">${brl(a.valor)}</span>
          <button class="inv-aporte-del" onclick="delAporte('${i.id}','${a.id}')" title="Remover aporte">✕</button>
        </div>`,
                )
                .join("");
              const showDiv=i.tipo==="FII"||i.tipo==="Ações";
              return `<div class="inv-card">
        <div class="inv-card-acts">
          ${showDiv?`<button class="btn-div" onclick="openDividendo('${i.id}')">💰 Dividendo</button>`:""}
          <button class="btn-ghost" onclick="openAporte('${i.id}')">+ Aporte</button>
          <button class="ibt" onclick="openModal('investimento','${i.id}')" title="Editar">⚙</button>
          <button class="ibt del" onclick="del('i','${i.id}')">✕</button>
        </div>
        <div class="inv-name">${esc(i.nome)}</div>
        <div class="inv-type">${esc(i.tipo)}</div>
        <div class="inv-val">${brl(totalVal)}</div>
        ${i.aportes && i.aportes.length ? `<div class="inv-aportes">${aporteRows}</div>` : ""}
        <div style="margin-top:8px"><button class="btn-ghost" style="width:100%;justify-content:center" onclick="carryInvest('${i.id}')">→ Próximo mês</button></div>
      </div>`;
            })
            .join("");
        }
      }

      // ─── DRAG ───────────────────────────────────────────────
      function dStart(e, id, sec) {
        dragId = id;
        dragSec = sec;
        e.dataTransfer.effectAllowed = "move";
        setTimeout(() => e.currentTarget.classList.add("dragging"), 0);
      }
      function dOver(e) {
        e.preventDefault();
        const tr = e.currentTarget;
        if (!tr.classList.contains("dragging")) {
          document
            .querySelectorAll("tr.drag-target")
            .forEach((el) => el.classList.remove("drag-target"));
          tr.classList.add("drag-target");
        }
      }
      function dLeave(e) {
        e.currentTarget.classList.remove("drag-target");
      }
      function dDrop(e, tid, sec) {
        e.preventDefault();
        if (!dragId || dragId === tid || sec !== dragSec) return;
        const data = getMonth(),
          arr = sec === "d" ? data.despesas : data.rendas;
        const fi = arr.findIndex((x) => x.id === dragId),
          ti = arr.findIndex((x) => x.id === tid);
        if (fi < 0 || ti < 0) return;
        const [item] = arr.splice(fi, 1);
        arr.splice(ti, 0, item);
        save();
        render();
      }
      function dEnd() {
        document
          .querySelectorAll(".dragging,.drag-target")
          .forEach((el) => el.classList.remove("dragging", "drag-target"));
        dragId = null;
        dragSec = null;
      }

      // ─── SALDO ──────────────────────────────────────────────
      function editSaldo(e) {
        e.preventDefault();
        const data = getMonth();
        const card = document.querySelector(".scard.c-blue .scard-value");
        card.innerHTML = `<input class="saldo-fi" id="saldoIn" type="number" step="0.01" value="${data.saldoInicial}" onblur="saveSaldo()" onkeydown="if(event.key==='Enter')saveSaldo()">`;
        document.getElementById("saldoIn").focus();
        document.getElementById("saldoIn").select();
      }
      function saveSaldo() {
        const v = parseFloat(document.getElementById("saldoIn")?.value) || 0;
        getMonth().saldoInicial = v;
        save();
        render();
        toast("Saldo inicial atualizado", "ok");
      }

      // ─── FILTER ─────────────────────────────────────────────
      function setFilter(f, btn) {
        curFilter = f;
        btn
          .closest(".ftabs")
          .querySelectorAll(".ftab")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        render();
      }

      // ─── TOGGLE ─────────────────────────────────────────────
      function toggle(t, id) {
        const data = getMonth();
        if (t === "d") {
          const it = data.despesas.find((d) => d.id === id);
          if (it) it.realizado = it.realizado > 0 ? 0 : it.planejado;
        } else {
          const it = data.rendas.find((r) => r.id === id);
          if (it) it.realizado = it.realizado > 0 ? 0 : it.planejado;
        }
        save();
        render();
      }

      // ─── DELETE + UNDO ──────────────────────────────────────
      function del(t, id) {
        const data = getMonth();
        let removed, idx, label;
        if (t === "d") {
          idx = data.despesas.findIndex((d) => d.id === id);
          removed = data.despesas[idx];
          data.despesas.splice(idx, 1);
          label = `Despesa "${removed.nome}" removida`;
          undoStack = [
            {
              restore: () => {
                data.despesas.splice(idx, 0, removed);
                save();
                render();
              },
            },
          ];
        } else if (t === "r") {
          idx = data.rendas.findIndex((r) => r.id === id);
          removed = data.rendas[idx];
          data.rendas.splice(idx, 1);
          label = `Renda "${removed.nome}" removida`;
          undoStack = [
            {
              restore: () => {
                data.rendas.splice(idx, 0, removed);
                save();
                render();
              },
            },
          ];
        } else {
          idx = data.investimentos.findIndex((i) => i.id === id);
          removed = data.investimentos[idx];
          data.investimentos.splice(idx, 1);
          label = `Investimento "${removed.nome}" removido`;
          undoStack = [
            {
              restore: () => {
                data.investimentos.splice(idx, 0, removed);
                save();
                render();
              },
            },
          ];
        }
        save();
        render();
        toastUndo(label);
      }

      function undoLast() {
        if (!undoStack.length) return;
        undoStack.pop().restore();
        undoStack = [];
        toast("Ação desfeita", "ok");
      }

      // ─── DEL APORTE ─────────────────────────────────────────
      function delAporte(invId, aporteId) {
        const data = getMonth();
        const inv = data.investimentos.find((i) => i.id === invId);
        if (!inv || !inv.aportes) return;
        const idx = inv.aportes.findIndex((a) => a.id === aporteId);
        if (idx < 0) return;
        const removed = inv.aportes[idx];
        inv.aportes.splice(idx, 1);
        save();
        render();
        undoStack = [
          {
            restore: () => {
              inv.aportes.splice(idx, 0, removed);
              save();
              render();
            },
          },
        ];
        toastUndo("Aporte removido");
      }

      // ─── CARRY INVESTMENT ───────────────────────────────────
      function carryInvest(invId) {
        const data = getMonth();
        const inv = data.investimentos.find((i) => i.id === invId);
        if (!inv) return;
        const nmo = mo === 11 ? 0 : mo + 1,
          nyr = mo === 11 ? yr + 1 : yr;
        const next = getMonth(nyr, nmo);
        const exists = next.investimentos.find(
          (i) => i.nome === inv.nome && i.tipo === inv.tipo,
        );
        if (exists) {
          toast("Investimento já existe no próximo mês", "warn");
          return;
        }
        next.investimentos.push({
          ...JSON.parse(JSON.stringify(inv)),
          id: uid(),
        });
        save();
        toast(`"${inv.nome}" copiado para ${MONTHS[nmo]}/${nyr}`, "ok");
      }

      function closeModal() {
        document.getElementById("overlay").classList.remove("open");
        const acts=document.querySelector(".modal-actions");
        if(acts)acts.innerHTML=`<button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="saveModal()">Salvar</button>`;
        modalCtx=null;
      }
      function handleOverlayClick(e) {
        if (e.target === document.getElementById("overlay")) closeModal();

      function saveModal() {
        if (!modalCtx) return;
        const { type, editId, invId } = modalCtx;
        const data = getMonth();

        // ── DIVIDENDO ──
        if(type==="dividendo"){
          const{invId}=modalCtx,inv=data.investimentos.find(i=>i.id===invId);
          if(!inv)return;
          const valor=parseFloat(document.getElementById("fDivValor")?.value)||0;
          const dia=parseInt(document.getElementById("fDivDia")?.value)||null;
          const rec=document.getElementById("fDivRec")?.checked;
          if(!valor||valor<=0){toast("Informe o valor","err");return;}
          data.rendas.push({id:uid(),nome:"Dividendo "+inv.nome,planejado:valor,realizado:rec?valor:0,data:dia,dividendoDe:inv.id});
          save();render();closeModal();toast("Dividendo de "+brl(valor)+" registrado!","ok");
          return;
        }

                // ── APORTE ──
        if (type === "aporte") {
          const valor =
            parseFloat(document.getElementById("fAporteValor")?.value) || 0;
          const dt = document.getElementById("fAporteData")?.value;
          const impacto =
            document.querySelector('input[name="impacto"]:checked')?.value ||
            "nenhum";
          if (!valor || valor <= 0) {
            toast("Informe o valor", "err");
            return;
          }
          if (!dt) {
            toast("Informe a data", "err");
            return;
          }
          const inv = data.investimentos.find((i) => i.id === invId);
          if (!inv) return;
          if (!inv.aportes) inv.aportes = [];
          inv.aportes.push({ id: uid(), valor, data: dt, impacto });
          save();
          render();
          closeModal();
          toast(`Aporte de ${brl(valor)} registrado!`, "ok");
          return;
        }

        const nome = document.getElementById("fNome")?.value.trim();
        if (!nome) {
          toast("Preencha o nome", "err");
          return;
        }

        if (type === "despesa") {
          const val = parseFloat(document.getElementById("fValor")?.value) || 0;
          const pago = document.getElementById("fPago")?.checked;
          const tipo = document.getElementById("fTipo")?.value;
          const subtipo =
            tipo === "fixo"
              ? document.getElementById("fSubtipo")?.value || "boleto"
              : null;
          const dt = parseInt(document.getElementById("fData")?.value) || null;
          const autoReplicar = tipo==="fixo"&&!!(document.getElementById("fAutoRep")?.checked);
          const obj = { nome, planejado:val, realizado:pago?val:0, tipo, subtipo, data:dt, autoReplicar };
          if (editId) {
            const it = data.despesas.find((d) => d.id === editId);
            if (it) Object.assign(it, obj);
          } else data.despesas.push({ id: uid(), ...obj });
        } else if (type === "renda") {
          const val = parseFloat(document.getElementById("fValor")?.value) || 0;
          const rec = document.getElementById("fRec")?.checked;
          const dt = parseInt(document.getElementById("fData")?.value) || null;
          const obj = {
            nome,
            planejado: val,
            realizado: rec ? val : 0,
            data: dt,
          };
          if (editId) {
            const it = data.rendas.find((r) => r.id === editId);
            if (it) Object.assign(it, obj);
          } else data.rendas.push({ id: uid(), ...obj });
        } else {
          const tipo = document.getElementById("fInvTipo")?.value;
          if (tipo === "CDB") {
            const vi =
              parseFloat(document.getElementById("fValorInicial")?.value) || 0;
            const pct =
              parseFloat(document.getElementById("fPctCDI")?.value) || 100;
            const di = document.getElementById("fDataInicio")?.value;
            if (!di) {
              toast("Informe a data do 1º aporte", "err");
              return;
            }
            if (editId) {
              const it = data.investimentos.find((i) => i.id === editId);
              if (it) {
                it.nome = nome;
                it.percentualCDI = pct;
                if (!it.aportes || !it.aportes.length)
                  it.aportes = [
                    { id: uid(), valor: vi, data: di, impacto: "nenhum" },
                  ];
              }
            } else {
              data.investimentos.push({
                id: uid(),
                nome,
                tipo,
                percentualCDI: pct,
                aportes: [
                  { id: uid(), valor: vi, data: di, impacto: "nenhum" },
                ],
              });
            }
          } else {
            const val =
              parseFloat(document.getElementById("fValor")?.value) || 0;
            if (editId) {
              const it = data.investimentos.find((i) => i.id === editId);
              if (it) Object.assign(it, { nome, tipo, valor: val });
            } else
              data.investimentos.push({
                id: uid(),
                nome,
                tipo,
                valor: val,
                aportes: [],
              });
          }
        }
        save();
        render();
        closeModal();
        toast("Salvo!", "ok");
      }

      // ─── COPY ───────────────────────────────────────────────
      function copyPrevMonthFixed() {
        const pmo = mo === 0 ? 11 : mo - 1,
          pyr = mo === 0 ? yr - 1 : yr;
        const prev = getMonth(pyr, pmo),
          curr = getMonth();
        const fixed = prev.despesas.filter((d) => d.tipo === "fixo");
        if (!fixed.length) {
          toast("Nenhuma despesa fixa no mês anterior", "warn");
          return;
        }
        const existing = new Set(
          curr.despesas.map((d) => d.nome.toLowerCase()),
        );
        let added = 0;
        fixed.forEach((d) => {
          if (!existing.has(d.nome.toLowerCase())) {
            curr.despesas.push({ ...d, id: uid(), realizado: 0 });
            added++;
          }
        });
        if (!added) {
          toast("Fixas já existem neste mês", "warn");
          return;
        }
        save();
        render();
        toast(`${added} fixas copiadas!`, "ok");
      }

      function copyPrevMonthRenda() {
        const pmo = mo === 0 ? 11 : mo - 1,
          pyr = mo === 0 ? yr - 1 : yr;
        const prev = getMonth(pyr, pmo),
          curr = getMonth();
        if (!prev.rendas.length) {
          toast("Nenhuma renda no mês anterior", "warn");
          return;
        }
        const existing = new Set(curr.rendas.map((r) => r.nome.toLowerCase()));
        let added = 0;
        prev.rendas.forEach((r) => {
          if (!existing.has(r.nome.toLowerCase())) {
            curr.rendas.push({ ...r, id: uid(), realizado: 0 });
            added++;
          }
        });
        if (!added) {
          toast("Rendas já existem neste mês", "warn");
          return;
        }
        save();
        render();
        toast(`${added} rendas copiadas!`, "ok");
      }

      function exportData() {

          type: "application/json",
        });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);

      function importClick(){document.getElementById("importFile").click();}
      function exportCSV(){
        const data=getMonth();
        const rows=[["Tipo","Nome","Planejado (R$)","Realizado (R$)","Dia","Info","Status"]];
        data.rendas.forEach(r=>rows.push(["Renda",r.nome,r.planejado.toFixed(2),r.realizado.toFixed(2),r.data||"",r.dividendoDe?"Dividendo":"",r.realizado>0?"Recebido":"Pendente"]));
        data.despesas.forEach(d=>rows.push(["Despesa",d.nome,d.planejado.toFixed(2),d.realizado.toFixed(2),d.data||"",d.subtipo||d.tipo,d.realizado>0?"Pago":"Pendente"]));
        data.investimentos.forEach(i=>{
          if(i.tipo==="CDB"&&i.aportes&&i.aportes.length){const cv=calcCDB(i);rows.push(["Investimento",i.nome,(cv?cv.valorTotal:0).toFixed(2),(cv?cv.valorAtual:0).toFixed(2),"","CDB "+(i.percentualCDI||100)+"% CDI",""])}
          else{const t=(i.valor||0)+(i.aportes||[]).reduce((s,a)=>s+a.valor,0);rows.push(["Investimento",i.nome,t.toFixed(2),t.toFixed(2),"",i.tipo,""])}
        });
        const csv=rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(",")).join("\n");
        const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
        const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`financeos_${yr}-${String(mo+1).padStart(2,"0")}.csv`;a.click();
        toast("CSV exportado!","ok");
      }
      function importData(e) {
        const file = e.target.files[0];
        if (!file) return;
        const r = new FileReader();
        r.onload = (ev) => {
          try {
            state = JSON.parse(ev.target.result);
            migrate();
            save();
            render();
            toast("Importado!", "ok");
          } catch {
            toast("Arquivo inválido", "err");
          }
        };
        r.readAsText(file);
        e.target.value = "";
      }

        const t = document.getElementById("toast");
        t.className = `toast ${type} show`;
        clearTimeout(t._t);
        t._t = setTimeout(() => t.classList.remove("show"), 3000);
      }
      function toastUndo(msg) {
        document.getElementById("toastMsg").textContent = msg;
        document.getElementById("toastUndo").style.display = "";
        const t = document.getElementById("toast");
        t.className = "toast warn show";
        clearTimeout(t._t);
        t._t = setTimeout(() => {
          t.classList.remove("show");
          undoStack = [];
        }, 5000);
      }

      document.addEventListener("click",()=>closeUtilMenu());

      function toggleHistPanel(){
        const panel=document.getElementById("histPanel");
        panel.classList.toggle("open");
        if(panel.classList.contains("open"))renderHistory();
      }
      function renderHistory(){
        const months=[];
        for(let i=11;i>=0;i--){
          const d=new Date(yr,mo-i,1),y=d.getFullYear(),m=d.getMonth();
          const k=`${y}-${String(m+1).padStart(2,"0")}`;
          if(state[k]){
            const md=state[k];
            const tRP=md.rendas.reduce((s,r)=>s+r.planejado,0);
            const tDP=md.despesas.reduce((s,d)=>s+d.planejado,0);
            months.push({label:MONTHS[m].slice(0,3)+"/"+String(y).slice(2),tRP,tDP,sobra:md.saldoInicial+tRP-tDP});
          }
        }
        const body=document.getElementById("histBody");
        if(!months.length){body.innerHTML=`<div class="hist-empty">Sem dados históricos. Navegue por outros meses e adicione dados para ver o histórico aqui.</div>`;return;}
        const maxVal=Math.max(...months.flatMap(m=>[m.tRP,m.tDP,Math.abs(m.sobra)]),1);
        const bW=26,gap=5,gW=bW*3+gap*2,padB=32,padL=60,padT=10,cH=190;
        const sH=v=>Math.max(2,(v/maxVal)*(cH-padB-padT));
        const fmtK=v=>v>=1000?(v/1000).toFixed(1)+"k":Math.round(v).toString();
        let bars="",lbls="",grid="";
        for(let i=0;i<=4;i++){
          const val=maxVal*i/4,y=cH-padB-(val/maxVal)*(cH-padB-padT);
          grid+=`<line x1="${padL}" y1="${y}" x2="${padL+months.length*(gW+18)+10}" y2="${y}" stroke="var(--border)" stroke-dasharray="3,3"/>`;
          grid+=`<text x="${padL-6}" y="${y+4}" text-anchor="end" font-size="10" fill="var(--text3)">${fmtK(val)}</text>`;
        }
        months.forEach((m,idx)=>{
          const x=padL+idx*(gW+18)+6,hRP=sH(m.tRP),hDP=sH(m.tDP),hSobra=sH(Math.abs(m.sobra));
          const sc=m.sobra>=0?"var(--blue)":"var(--yellow)";
          bars+=`<rect x="${x}" y="${cH-padB-hRP}" width="${bW}" height="${hRP}" fill="var(--green)" rx="3" opacity=".85"><title>Renda: ${brl(m.tRP)}</title></rect>`;
          bars+=`<rect x="${x+bW+gap}" y="${cH-padB-hDP}" width="${bW}" height="${hDP}" fill="var(--red)" rx="3" opacity=".85"><title>Despesas: ${brl(m.tDP)}</title></rect>`;
          bars+=`<rect x="${x+bW*2+gap*2}" y="${cH-padB-hSobra}" width="${bW}" height="${hSobra}" fill="${sc}" rx="3" opacity=".85"><title>Sobra: ${brl(m.sobra)}</title></rect>`;
          lbls+=`<text x="${x+gW/2}" y="${cH-padB+18}" text-anchor="middle" font-size="10" fill="var(--text3)">${m.label}</text>`;
        });
        const svgW=padL+months.length*(gW+18)+16;
        body.innerHTML=`<div class="hist-legend"><div class="hist-leg-item"><div class="hist-leg-dot" style="background:var(--green)"></div>Renda</div><div class="hist-leg-item"><div class="hist-leg-dot" style="background:var(--red)"></div>Despesas</div><div class="hist-leg-item"><div class="hist-leg-dot" style="background:var(--blue)"></div>Sobra positiva</div><div class="hist-leg-item"><div class="hist-leg-dot" style="background:var(--yellow)"></div>Sobra negativa</div></div><div class="hist-chart"><svg width="${svgW}" height="${cH}" style="display:block;overflow:visible">${grid}${bars}${lbls}</svg></div>`;
      }

      function openDividendo(invId){
        const data=getMonth(),inv=data.investimentos.find(i=>i.id===invId);
        if(!inv)return;
        modalCtx={type:"dividendo",invId};
        document.getElementById("modalTitle").textContent="💰 Registrar Dividendo — "+inv.nome;
        document.getElementById("modalBody").innerHTML=`
          <div class="modal-info">O dividendo será lançado como renda neste mês, vinculado a <strong>${esc(inv.nome)}</strong>.</div>
          <div class="fg"><label>Valor (R$)</label><input class="fi" id="fDivValor" type="number" step="0.01" placeholder="0,00"></div>
          <div class="fg"><label>Dia de Recebimento</label><input class="fi" id="fDivDia" type="number" min="1" max="31" placeholder="Ex: 15" value="${new Date().getDate()}"></div>
          <label class="check-row"><input type="checkbox" id="fDivRec"><span>Já foi recebido</span></label>`;
        document.getElementById("overlay").classList.add("open");
        setTimeout(()=>document.getElementById("fDivValor")?.focus(),120);
      }

            // ─── KEYBOARD ───────────────────────────────────────────
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
        if (e.key === "Enter" && modalCtx) {
          e.preventDefault();
          saveModal();
        }
        if (!modalCtx) {
          if (e.key === "ArrowLeft") prevMonth();
          if (e.key === "ArrowRight") nextMonth();
        }
      });

      load();
      render();
      fetchCDI();
    </script>
  </body>
</html>
